trigger:
- main  # Cambia por tu rama principal si es master

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Instalar el SDK de .NET 9
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '9.x'

# 2. Restaurar dependencias, compilar y empaquetar tu API
- task: DotNetCoreCLI@2
  displayName: 'Compilar y Publicar API .NET 9'
  inputs:
    command: 'publish'
    publishWebProjects: true # Compila automáticamente proyectos web del repositorio
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'

# 3. Desplegar directo a Azure usando el Perfil de Publicación (Sin conexiones globales)
- task: AzureWebApp@1
  displayName: 'Desplegar a Azure App Service Gratis'
  inputs:
    azureSubscription: '' # SE DEJA VACÍO DE FORMA OBLIGATORIA
    appType: 'webAppLinux' # Coloca 'webApp' si tu App Service gratis lo creaste en Windows
    appName: 'App-AgroVisionPWA'
    package: '$(Build.ArtifactStagingDirectory)/**/*.zip'
    
