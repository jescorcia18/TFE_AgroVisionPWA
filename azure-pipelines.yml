trigger:
  branches:
    include:
      - '*'

pool:
  name: 'Default' # Tu máquina local como servidor

steps:
- checkout: self
  persistCredentials: true
  clean: true
  fetchDepth: 0

- script: |
    REM Configura la identidad de Git
    git config --global user.email "azuredevops@microsoft.com"
    git config --global user.name "Azure DevOps Pipeline"
    
    echo Iniciando sincronizacion limpia con GitHub...
    
    REM Envolvemos la URL y las referencias entre comillas dobles para que Windows no destruya la ruta
    git push --prune "https://github.com" "+refs/remotes/origin/*:refs/heads/*" "+refs/tags/*:refs/tags/*"
  displayName: 'Hacer espejo hacia GitHub'