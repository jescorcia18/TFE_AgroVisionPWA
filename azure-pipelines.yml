trigger:
  branches:
    include:
      - '*'

pool:
  name: 'Default' # Tu máquina local como servidor

steps:
- checkout: self
  persistCredentials: true
  clean: true
  fetchDepth: 0

# --- PASO 1: sincronización existente con GitHub ---
- powershell: |
    # Configura la identidad de Git
    git config --global user.email "azuredevops@microsoft.com"
    git config --global user.name "Azure DevOps Pipeline"
    
    Write-Host "Iniciando sincronizacion limpia con GitHub usando PowerShell..."
    
    # En PowerShell ejecutamos el comando directo. Las comillas simples protegen toda la cadena de Git
    git push --prune "https://github.com/jescorcia18/TFE_AgroVisionPWA" '+refs/remotes/origin/*:refs/heads/*' '+refs/tags/*:refs/tags/*'
  displayName: 'Hacer espejo hacia GitHub'

  # --- PASO 2: Compilar  API .NET 9 (En máquina Local) ---
- task: DotNetCoreCLI@2
  displayName: 'Compilar y Publicar API .NET 9'
  inputs:
    command: 'publish'
    publishWebProjects: true
    # Argumentos para empaquetar la aplicación en una carpeta temporal
    arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'

# --- PASO 3: Desplegar a Azure de forma nativa (Validado sin rutas manuales) ---
- powershell: |
    # 1. Credenciales obligatorias extraídas de tu archivo .PublishSettings
    $username = '$App-AgroVisionPWA' 
    $password = 'xPgFknQNA92bfXxe2mvAkd8CgynRpNod5wmidia85yrDGEFqspfzxJ8Ha8TR'

    Write-Host "Buscando el archivo empaquetado de tu API de .NET 9..."

    Write-Host "Contenido del ArtifactStagingDirectory"
    Get-ChildItem "$(Build.ArtifactStagingDirectory)" -Recurse | Format-Table FullName

    # 2. Localizar el archivo comprimido .zip generado por la compilación anterior
    $zipPath = Get-ChildItem "$(Build.ArtifactStagingDirectory)\*.zip" | Select-Object -First 1 -ExpandProperty FullName
    
    if (-not $zipPath) {
        Write-Error "Error: No se encontró ningún archivo .zip para desplegar en $(Build.ArtifactStagingDirectory)."
        exit 1
    }

    Write-Host "Encontro el archivo .zip para desplegar en $(Build.ArtifactStagingDirectory)."

    Write-Host "Preparando token de autenticación para Azure..."
    $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(("{0}:{1}" -f $username, $password)))

    Write-Host "Conectando con la nube de Azure y subiendo paquete a tu cuenta gratis..."

    # 2. Tu URL administrativa configurada correctamente con el formato de Azure
    $uri = "https://app-agrovisionpwa-hhgcgwhwhpbpf0f6.scm.eastus-01.azurewebsites.net/api/zipdeploy"

    Write-Host $uri

    try {
        Invoke-WebRequest `
        -Uri "https://app-agrovisionpwa-hhgcgwhwhpbpf0f6.scm.eastus-01.azurewebsites.net" `
        -UseBasicParsing
    }
    catch {
        Write-Host $_.Exception.Response.StatusCode
    }

     # 3. Envío directo del archivo crudo (Evita el error 404 y fallos de formato)
    Invoke-RestMethod -Uri $uri -Headers @{Authorization=("Basic {0}" -f $base64AuthInfo)} -Method Post -InFile $zipPath -ContentType "application/octet-stream" -TimeoutSec 600
    
    Write-Host "¡Subida terminada y despliegue completado con éxito!"
  displayName: 'Desplegar Web API a Azure Gratis'
