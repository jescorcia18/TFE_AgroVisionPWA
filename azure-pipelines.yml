trigger:
  branches:
    include:
      - '*'

pool:
  name: 'Default' # Tu máquina local

variables:
- group: Github-Mirror-Vars

steps:
- checkout: self
  persistCredentials: true
  clean: true
  fetchDepth: 0

- script: |
    REM Configura la identidad de Git
    git config --global user.email "azuredevops@microsoft.com"
    git config --global user.name "Azure DevOps Pipeline"
    
    echo Iniciando sincronizacion con GitHub...
    
    REM Inyectamos la variable directamente en la línea de Git para evitar fallos de asignación en CMD
    git push --prune https://x-access-token:$(GithubToken)@://github.com +refs/remotes/origin/*:refs/heads/* +refs/tags/*:refs/tags/*
  displayName: 'Hacer espejo hacia GitHub'