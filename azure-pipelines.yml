trigger:
  branches:
    include:
      - '*'

pool:
  name: 'Default' # Tu máquina local

variables:
- group: Github-Mirror-Vars

steps:
- checkout: self
  persistCredentials: true
  clean: true
  fetchDepth: 0

- script: |
    REM Configura la identidad de Git
    git config --global user.email "azuredevops@microsoft.com"
    git config --global user.name "Azure DevOps Pipeline"
    
    REM Configura la URL destino usando la sintaxis de variables de Windows
    set TARGET_REPO=https://x-access-token:$(GithubToken)@://github.com
    
    echo Iniciando sincronizacion con GitHub...
    
    REM Sincroniza usando los porcentajes para la variable de entorno de Windows
    git push --prune %TARGET_REPO% +refs/remotes/origin/*:refs/heads/* +refs/tags/*:refs/tags/*
  displayName: 'Hacer espejo hacia GitHub'

